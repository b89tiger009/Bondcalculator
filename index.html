<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>債券投資報酬率自動計算器</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif, "Microsoft JhengHei";
        }
        body {
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 700px;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #1e3a8a;
            margin-bottom: 25px;
            font-size: 24px;
            font-weight: 700;
            border-bottom: 3px solid #3b82f6;
            padding-bottom: 10px;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: #2563eb;
            margin-top: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: "";
            display: inline-block;
            width: 6px;
            height: 18px;
            background-color: #2563eb;
            margin-right: 8px;
            border-radius: 2px;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        @media (max-width: 500px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
            transition: all 0.2s;
            background-color: #f9fafb;
        }
        input:focus {
            outline: none;
            border-color: #3b82f6;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .result-box {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 20px;
            margin-top: 25px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #e2e8f0;
            font-size: 15px;
        }
        .result-row:last-child {
            border-bottom: none;
            padding-top: 15px;
            margin-top: 5px;
        }
        .result-label {
            color: #475569;
            font-weight: 500;
        }
        .result-value {
            font-weight: 600;
            color: #0f172a;
        }
        .highlight-row {
            background-color: #eff6ff;
            margin: 5px -20px;
            padding: 12px 20px;
            border-top: 1px solid #bfdbfe;
            border-bottom: 1px solid #bfdbfe !important;
        }
        .highlight-row .result-label {
            color: #1e40af;
            font-weight: bold;
        }
        .highlight-row .result-value {
            color: #2563eb;
            font-size: 18px;
            font-weight: bold;
        }
        .risk-box {
            margin-top: 20px;
            background-color: #fff7ed;
            border: 1px solid #ffedd5;
            border-radius: 8px;
            padding: 15px;
            font-size: 13px;
            color: #9a3412;
        }
        .risk-box h4 {
            margin: 0 0 8px 0;
            font-size: 14px;
            font-weight: 600;
            color: #c2410c;
        }
        .risk-box ul {
            margin: 0;
            padding-left: 20px;
        }
        .risk-box li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>債券投資報酬率自動計算器</h1>
    
    <div class="section-title">輸入投資資料</div>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="faceValue">申購金額 (美金)</label>
            <input type="number" id="faceValue" value="10000" placeholder="例如: 10000" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="price">每單位價格 (市價)</label>
            <input type="number" id="price" value="106.69" step="0.01" placeholder="例如: 106.69" oninput="calculate()">
        </div>
    </div>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="orderDate">下單日期 (西元年月日)</label>
            <input type="date" id="orderDate" value="2026-06-18" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="maturityDate">債券到期日 (西元年月日)</label>
            <input type="date" id="maturityDate" value="2033-12-31" oninput="calculate()">
        </div>
    </div>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="couponRate">票面利息 (%)</label>
            <input type="number" id="couponRate" value="5.123" step="0.001" placeholder="例如: 5.123" oninput="calculate()">
        </div>
        <div class="input-group">
            <label for="previousInterest">前手息 / 手續費 (美金)</label>
            <input type="number" id="previousInterest" value="69.73" step="0.01" placeholder="例如: 69.73" oninput="calculate()">
        </div>
    </div>

    <div class="result-box">
        <div class="section-title" style="margin-top:0;">計算結果報表</div>
        
        <div class="result-row">
            <span class="result-label">1. 實付申購金額</span>
            <span class="result-value" id="res_purchaseAmount">0.00 美金</span>
        </div>
        <div class="result-row">
            <span class="result-label">2. 每半年配息金額</span>
            <span class="result-value" id="res_semiAnnual">0.00 美金</span>
        </div>
        <div class="result-row">
            <span class="result-label">3. 每年配息金額</span>
            <span class="result-value" id="res_annual">0.00 美金</span>
        </div>
        <div class="result-row" style="background-color: #f0fdf4;">
            <span class="result-label" style="color: #166534; font-weight: 600;">4. 從資料輸入至到期日為止可領配息次數</span>
            <span class="result-value" id="res_count" style="color: #166534;">0 次</span>
        </div>
        <div class="result-row">
            <span class="result-label">5. 配息總金額</span>
            <span class="result-value" id="res_totalInterest">0.00 美金</span>
        </div>
        <div class="result-row">
            <span class="result-label">6. 可領回總金額 (本金+利息)</span>
            <span class="result-value" id="res_totalReturn">0.00 美金</span>
        </div>
        <div class="highlight-row">
            <span class="result-label">7. 總報酬率</span>
            <span class="result-value" id="res_totalReturnRate">0.00%</span>
        </div>
    </div>

    <div class="risk-box">
        <h4>※ 投資風險提示</h4>
        <ul>
            <li>美元匯率：影響配息換回台幣之實質金額。</li>
            <li>到期日前賣出：賣出金額將以當時之市場價格（市價）計算，可能產生資本利損。</li>
            <li>發行單位違約風險（如：汽車公司倒閉風險）。</li>
        </ul>
    </div>
</div>

<script>
function calculate() {
    // 獲取輸入值
    const faceValue = parseFloat(document.getElementById('faceValue').value) || 0;
    const price = parseFloat(document.getElementById('price').value) || 0;
    const couponRate = parseFloat(document.getElementById('couponRate').value) || 0;
    const previousInterest = parseFloat(document.getElementById('previousInterest').value) || 0;
    
    const orderDateVal = document.getElementById('orderDate').value;
    const maturityDateVal = document.getElementById('maturityDate').value;

    let interestCount = 0;

    // 自動計算配息次數：(債券到期日 - 下單日期) / 6個月，不足6個月不計息
    if (orderDateVal && maturityDateVal) {
        const orderDate = new Date(orderDateVal);
        const maturityDate = new Date(maturityDateVal);
        
        if (maturityDate > orderDate) {
            // 計算總月份差距
            let months = (maturityDate.getFullYear() - orderDate.getFullYear()) * 12;
            months += maturityDate.getMonth() - orderDate.getMonth();
            
            // 處理日期的天數差距，若到期日的天數小於下單日的天數，扣除不足的一個月
            if (maturityDate.getDate() < orderDate.getDate()) {
                months--;
            }
            
            // 每6個月算一次配息，向下取整（不足6個月不計）
            interestCount = Math.floor(months / 6);
            if (interestCount < 0) interestCount = 0;
        }
    }

    // 1. 申購金額 = 【面額 X 市價 / 100 + 前手息】 （此處面額即輸入的申購金額欄位）
    const purchaseAmount = (faceValue * price / 100) + previousInterest;

    // 2. 每半年配息 = 面額 * 票面利息(%) / 2
    const semiAnnual = faceValue * (couponRate / 100) / 2;

    // 3. 每年配息 = 每半年配息 * 2
    const annual = semiAnnual * 2;

    // 5. 配息總金額 = 每半年配息 * 次數
    const totalInterest = semiAnnual * interestCount;

    // 6. 可領回總金額 = 配息總額 + 面額
    const totalReturn = totalInterest + faceValue;

    // 7. 總報酬率 = 配息總額 / 申購金額 * 100%
    let totalReturnRate = 0;
    if (purchaseAmount > 0) {
        totalReturnRate = (totalInterest / purchaseAmount) * 100;
    }

    // 渲染至網頁中
    document.getElementById('res_purchaseAmount').innerText = purchaseAmount.toFixed(2) + ' 美金';
    document.getElementById('res_semiAnnual').innerText = semiAnnual.toFixed(2) + ' 美金';
    document.getElementById('res_annual').innerText = annual.toFixed(2) + ' 美金';
    document.getElementById('res_count').innerText = interestCount + ' 次';
    document.getElementById('res_totalInterest').innerText = totalInterest.toFixed(2) + ' 美金';
    document.getElementById('res_totalReturn').innerText = totalReturn.toFixed(2) + ' 美金';
    document.getElementById('res_totalReturnRate').innerText = totalReturnRate.toFixed(2) + '%';
}

// 初始執行一次計算
calculate();
</script>

</body>
</html>
